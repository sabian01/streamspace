<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position</title>

  <style>
    body {
    height: 3000px;
    padding-top: 70px;
    }


    .box1 {
      background-color: lightgreen;
      height: 300px;
      width: 300px;
      position: relative;

    }

    .navbar {
      background-color: blueviolet;
      position: fixed;

      top: 0;
      left: 0;
      right: 0;
      height: 60px;
    }


    .absolute {
      position: absolute;
      background-color: black;
      height: 20px;
      width: 20px;
      text-align: center;
      color: white;

      top: -10px;
      right: -5px;
      cursor: pointer;
    }
  </style>
</head>
<body>


  <div class="navbar">
    navbar
  </div>


  <div class="box1">

    <div class="absolute">X</div>

  </div>
  
</body>
</html>
